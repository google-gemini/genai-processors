site_name: GenAI Processors
site_description: Build Modular, Asynchronous, and Composable AI Pipelines
site_url: https://google-gemini.github.io/genai-processors/
repo_url: https://github.com/google-gemini/genai-processors
repo_name: genai-processors

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - include-markdown

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
    - Processor: concepts/processor.md
    - Async & Streaming: concepts/async-streaming.md
    - Realtime Processing: concepts/realtime.md
    - Function Calling: concepts/function-calling.md
  - Rapid Prototyping:
    - AI Studio: rapid-prototyping/ai-studio.md
    - Command Line: rapid-prototyping/cli.md
  - Development:
    - Supported Models: development/supported-models.md
    - Built-in Processors: development/built-in-processors.md
    - Tracing: development/tracing.md
    - Caching: development/caching.md
  - Tutorials:
    - Content API: https://github.com/google-gemini/genai-processors/blob/main/notebooks/content_api_intro.ipynb
    - Processor Basics: https://colab.sandbox.google.com/github.com/google-gemini/genai-processors/blob/main/notebooks/processor_intro.ipynb
    - Create a Processor: https://colab.sandbox.google.com/github.com/google-gemini/genai-processors/blob/main/notebooks/create_your_own_processor.ipynb
    - Live Processors: https://colab.sandbox.google.com/github.com/google-gemini/genai-processors/blob/main/notebooks/live_processor_intro.ipynb
    - Function Calling: https://colab.sandbox.google.com/github.com/google-gemini/genai-processors/blob/main/notebooks/function_calling.ipynb
  - Examples:
    - Research Agent: https://github.com/google-gemini/genai-processors/blob/main/examples/research/README.md
    - Live commentator: https://github.com/google-gemini/genai-processors/blob/main/examples/live/README.md
    - Widgets: https://github.com/google-gemini/genai-processors/blob/main/examples/widgets/README.md
    - CLI: https://github.com/google-gemini/genai-processors/blob/main/examples/README.md
